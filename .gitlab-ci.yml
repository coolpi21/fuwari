stages:
  - build
  - deploy

variables:
  APP_NAME: astro-blog
  IMAGE_TAG: $APP_NAME:$CI_COMMIT_SHORT_SHA
  DOCKER_HOST: tcp://docker:2375 # 指向 DinD 服务
  DOCKER_TLS_CERTDIR: "" # 禁用 TLS（仅测试环境适用）

services:
  - docker:dind # 启动 Docker-in-Docker 服务[citation:9][citation:14]

build:
  stage: build
  tags:
    - docker
  image: docker:stable # 使用包含 Docker 客户端的镜像
  script:
    - docker build -t $IMAGE_TAG .
    - docker tag $IMAGE_TAG $APP_NAME:latest

deploy:
  stage: deploy
  tags:
    - docker
  image: docker:stable # 确保部署阶段也包含 Docker 客户端
  script:
    - docker stop $APP_NAME || true
    - docker rm $APP_NAME || true
    - docker run -d --name $APP_NAME -p 17000:9999 --restart unless-stopped $APP_NAME:latest
  only:
    - main

stages:
  - build
  - deploy

variables:
  APP_NAME: astro-blog
  IMAGE_TAG: $APP_NAME:$CI_COMMIT_SHORT_SHA

build:
  stage: build
  script:
    - docker build -t $IMAGE_TAG .
    - docker tag $IMAGE_TAG $APP_NAME:latest

deploy:
  stage: deploy
  script:
    # 停止并删除旧容器（如果存在）
    - docker stop $APP_NAME || true
    - docker rm $APP_NAME || true
    # 启动新容器
    - docker run -d --name $APP_NAME -p 17000:9999 $APP_NAME:latest
  only:
    - main
